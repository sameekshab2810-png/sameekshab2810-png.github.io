<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrendRadar — Phase 1</title>
  <style>
    body { margin: 0; background: #020817; color: #f1f5f9; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px; }
    .head { border: 1px solid #1e293b; background: #0b1220; border-radius: 14px; padding: 20px; }
    h1 { margin: 0; font-size: 30px; }
    h1 span { color: #3b82f6; }
    p { color: #94a3b8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 12px; margin-top: 18px; }
    .card { border: 1px solid #1e293b; background: #0f172a; border-radius: 12px; padding: 14px; }
    .num { font-size: 24px; font-weight: 800; color: #60a5fa; }
    .lbl { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    a.btn { text-decoration: none; color: #fff; background: #2563eb; padding: 10px 14px; border-radius: 10px; font-weight: 700; }
    a.alt { background: #1e293b; }
    .note { margin-top: 16px; font-size: 13px; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Trend<span>Radar</span> — Phase 1</h1>
      <p>Public project page (stable URL, no tunnel/IP prompt).</p>

      <div class="grid">
        <div class="card"><div class="num">Phase 1</div><div class="lbl">Status: Completed</div></div>
        <div class="card"><div class="num">5</div><div class="lbl">API Endpoints Implemented</div></div>
        <div class="card"><div class="num">SQLite</div><div class="lbl">Data Persistence Layer</div></div>
        <div class="card"><div class="num">FastAPI</div><div class="lbl">Backend Framework</div></div>
      </div>

      <div class="btns">
        <a class="btn" href="https://github.com/sameekshab2810-png/trendradar-phase1-public" target="_blank" rel="noopener">Open Public Repo</a>
        <a class="btn alt" href="https://github.com/sameekshab2810-png/trendradar-phase1-public/blob/main/README.md" target="_blank" rel="noopener">Open Documentation</a>
      </div>

      <div class="note">
        For a non-expiring live <code>/feed</code> and <code>/docs</code> URL, deploy to Render/Railway.
      </div>
    </div>
  </div>
</body>
</html>
