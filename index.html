<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrendRadar — Fleet-Tech Intelligence</title>
  <style>
    body { margin: 0; background: #020817; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .wrap { max-width: 980px; margin: 40px auto; padding: 0 16px; }
    .panel { border: 1px solid #1e293b; border-radius: 14px; background: #0b1220; padding: 24px; }
    h1 { margin: 0; font-size: 34px; }
    h1 span { color: #3b82f6; }
    p { color: #94a3b8; margin-top: 10px; }
    .grid { margin-top: 18px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 14px; }
    .num { font-size: 24px; font-weight: 800; color: #60a5fa; }
    .lbl { margin-top: 4px; color: #94a3b8; font-size: 12px; }
    .repo { margin-top: 18px; color: #cbd5e1; }
    .repo a { color: #93c5fd; text-decoration: none; }
    .repo a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Trend<span>Radar</span> — Phase 1</h1>
      <p>Fleet-Tech & AI Intelligence Platform (Public Showcase)</p>

      <div class="grid">
        <div class="card"><div class="num">Phase 1</div><div class="lbl">Status: Completed</div></div>
        <div class="card"><div class="num">5</div><div class="lbl">API Endpoints Implemented</div></div>
        <div class="card"><div class="num">SQLite</div><div class="lbl">Database Persistence</div></div>
        <div class="card"><div class="num">FastAPI</div><div class="lbl">Backend Stack</div></div>
      </div>

      <div class="repo">Source & docs: <a href="https://github.com/sameekshab2810-png/trendradar-phase1-public" target="_blank" rel="noopener">github.com/sameekshab2810-png/trendradar-phase1-public</a></div>
    </div>
  </div>
</body>
</html>
